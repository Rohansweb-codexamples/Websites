<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Website Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200 w-full max-w-md">
        <div class="flex flex-col items-center mb-8">
            <div class="bg-indigo-600 p-3 rounded-xl text-white mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
            </div>
            <h1 class="text-2xl font-bold">Welcome Back</h1>
            <p class="text-slate-500">Sign in to your portal</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" id="loginEmail" required class="w-full px-4 py-2 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="password" id="loginPass" required class="w-full px-4 py-2 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-semibold hover:bg-indigo-700 transition">Sign In</button>
        </form>
        <div id="loginError" class="hidden mt-4 text-red-500 text-sm text-center"></div>
    </div>

    <script>
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-web-portal';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const errDiv = document.getElementById('loginError');

            try {
                // Admin Hardcoded Check
                if (email === "rohanwest20@gmail.com" && pass === "Ewanandlam100") {
                    localStorage.setItem('portalUser', JSON.stringify({ name: "Admin", email: email, role: 'admin', id: 'admin' }));
                    window.location.href = 'dashboard.html';
                    return;
                }

                const snap = await db.collection(`artifacts/${appId}/public/data/accounts`).where('email', '==', email).get();
                if (!snap.empty && snap.docs[0].data().password === pass) {
                    const userData = snap.docs[0].data();
                    localStorage.setItem('portalUser', JSON.stringify({ ...userData, id: snap.docs[0].id, role: 'user' }));
                    window.location.href = 'dashboard.html';
                } else {
                    throw new Error("Invalid email or password");
                }
            } catch (err) {
                errDiv.textContent = err.message;
                errDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
